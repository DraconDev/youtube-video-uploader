name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: zip
          - os: macos-13
            target: x86_64-apple-darwin
            archive: zip
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install cross for ARM targets
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cargo install cross --locked

      - name: Build release
        run: |
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            cross build --release --target ${{ matrix.target }} -p youtube-uploader-cli
          else
            cargo build --release --target ${{ matrix.target }} -p youtube-uploader-cli
          fi

      - name: Smoke test
        if: matrix.target != 'aarch64-unknown-linux-gnu'
        shell: bash
        run: |
          binary="target/${{ matrix.target }}/release/youtube-uploader"
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            binary="${binary}.exe"
          fi
          "$binary" --help

      - name: Pack binary
        shell: bash
        run: |
          mkdir -p dist
          if [ "${{ matrix.archive }}" = "tar.gz" ]; then
            tar czf "dist/youtube-uploader-${{ matrix.target }}.tar.gz" \
              -C "target/${{ matrix.target }}/release" youtube-uploader
          elif [ "${{ matrix.archive }}" = "zip" ]; then
            binary="target/${{ matrix.target }}/release/youtube-uploader.exe"
            if [ ! -f "$binary" ]; then
              echo "ERROR: Expected binary not found at $binary"
              exit 1
            fi
            7z a -tzip "dist/youtube-uploader-${{ matrix.target }}.zip" \
              "$binary" \
              -mx9
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: youtube-uploader-${{ matrix.target }}
          path: dist/

  create-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create checksums
        run: |
          mkdir -p dist
          cd dist
          for f in */*; do
            sha256sum "$f" >> SHA256SUMS.txt
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
