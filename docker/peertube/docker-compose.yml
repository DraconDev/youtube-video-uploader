version: "3.8"

services:
  peertube:
    image: chocobozzz/peertube:production-bullseye
    container_name: peertube_test
    ports:
      - "9000:9000"
    environment:
      PEERTUBE_DB_HOSTNAME: postgres
      PEERTUBE_DB_USER: peertube
      PEERTUBE_DB_PASSWORD: peertube
      PEERTUBE_DB_SSL: "false"
      PEERTUBE_REDIS_HOSTNAME: redis
      PEERTUBE_ADMIN_EMAIL: test@example.com
      PEERTUBE_ADMIN_PASSWORD: "testpass123"
      PEERTUBE_WEBSOCKET: "false"
      PEERTUBE_OBJECT_STORAGE: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=5", "--spider", "http://localhost:9000"]
      interval: 10s
      timeout: 10s
      retries: 5

  postgres:
    image: postgres:15-alpine
    container_name: peertube_postgres_test
    environment:
      POSTGRES_DB: peertube
      POSTGRES_USER: peertube
      POSTGRES_PASSWORD: peertube
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U peertube"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: peertube_redis_test
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5